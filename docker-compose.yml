x-dev-service: &dev-service
  build:
    context: .
  image: isochrone-dev:node22
  working_dir: /workspace
  init: true
  volumes:
    - .:/workspace
    - pnpm-store:/pnpm/store
    - root-node-modules:/workspace/node_modules
    - web-node-modules:/workspace/apps/web/node_modules
    - pipeline-node-modules:/workspace/packages/pipeline/node_modules
    - raptor-node-modules:/workspace/packages/raptor/node_modules

services:
  pipeline:
    <<: *dev-service
    entrypoint:
      - pnpm
      - --filter
      - "@isochrone/pipeline"
      - exec
      - tsx
      - src/cli.ts

  web-dev:
    <<: *dev-service
    command:
      - pnpm
      - --filter
      - "@isochrone/web"
      - dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  pipeline-node-modules:
  raptor-node-modules:
