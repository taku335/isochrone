name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore GTFS cache
        uses: actions/cache@v6
        with:
          path: .cache/gtfs
          key: gtfs-${{ runner.os }}-${{ hashFiles('config/agencies.json') }}-${{ github.run_id }}
          restore-keys: |
            gtfs-${{ runner.os }}-${{ hashFiles('config/agencies.json') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download latest GTFS feed
        run: pnpm --filter @isochrone/pipeline cli download nagoya-cbus

      - name: Verify approved feed version
        shell: bash
        run: |
          set -euo pipefail
          approved="$(jq -r '.feedVersion' config/feed-snapshots/nagoya-cbus.json)"
          downloaded="$(jq -r '.lastModified' .cache/gtfs/nagoya-cbus/manifest.json)"
          if [[ "$downloaded" != "$approved" ]]; then
            echo "::error::CKAN feed $downloaded has not been approved (expected $approved)."
            exit 1
          fi

      - name: Validate browser dataset
        run: pnpm --filter @isochrone/pipeline cli validate nagoya-cbus

      - name: Generate deploy dataset
        run: >-
          pnpm --filter @isochrone/pipeline cli dataset nagoya-cbus
          --out-dir ../../apps/web/public/data

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build web app
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: pnpm --filter @isochrone/web build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v5
